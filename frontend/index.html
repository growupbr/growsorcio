<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grow Up CRM</title>
    <!-- Preload da imagem hero (LCP crítico — não tem lazy loading) -->
    <link rel="preload" as="image" href="/mktconsorcio.webp" fetchpriority="high" />
    <!-- Fontes da marca GrowSorcio -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=Nunito:wght@800;900&display=swap" rel="stylesheet" />
    <!-- Favicon SVG da marca -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0d1a'/><text y='72' x='50' text-anchor='middle' font-size='64' font-family='Arial' font-weight='900' fill='%23FF4500'>G</text></svg>" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function showFatal(message) {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:grid;place-items:center;background:#09090b;color:#f4f4f5;padding:24px;font-family:Inter,system-ui,sans-serif">' +
            '<div style="max-width:640px;width:100%;text-align:center;border:1px solid #27272a;border-radius:16px;padding:24px;background:#111113">' +
            '<h1 style="margin:0;color:#f87171;font-size:22px;font-weight:800">Erro ao carregar o app</h1>' +
            '<p style="margin-top:10px;color:#a1a1aa;word-break:break-word">' + String(message || 'Erro desconhecido') + '</p>' +
            '<p style="margin-top:14px;color:#71717a;font-size:13px">Atualize com Ctrl/Cmd + Shift + R.</p>' +
            '</div>' +
            '</div>';
        }

        window.addEventListener('error', function (event) {
          showFatal(event && event.message);
        });

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason;
          showFatal((reason && (reason.message || String(reason))) || 'Promise rejeitada sem tratamento');
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
